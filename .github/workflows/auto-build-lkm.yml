name: Auto Build External LKM

on:
  push:
    paths:
      - 'module/**'
      - 'loader/**'
      - '.github/workflows/auto-build-lkm.yml'
      - '.github/workflows/build-lkm.yml'
  pull_request:
    paths:
      - 'module/**'
      - 'loader/**'
      - '.github/workflows/auto-build-lkm.yml'
      - '.github/workflows/build-lkm.yml'

jobs:
  build-lkm:
    name: Build hello.ko for android14-6.1
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:android14-6.1-20260313
      options: --privileged

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Find kernel build directory
        id: find-kbuild
        run: |
          set -eux

          search_roots=""
          for root in /lib/modules /workspace /opt /android /kernel /build; do
            if [ -e "$root" ]; then
              search_roots="$search_roots $root"
            fi
          done

          if [ -z "$search_roots" ]; then
            echo "No search roots found."
            exit 1
          fi

          KOUT=""
          for symvers in $(find $search_roots -maxdepth 6 -type f -name Module.symvers 2>/dev/null); do
            if [ -s "$symvers" ]; then
              KOUT="$(dirname "$symvers")"
              break
            fi
          done

          KDIR=""
          if [ -n "$KOUT" ]; then
            probe="$KOUT"
            while [ "$probe" != "/" ]; do
              if [ -f "$probe/Makefile" ] && grep -q "KERNELRELEASE" "$probe/Makefile"; then
                KDIR="$probe"
                break
              fi
              probe="$(dirname "$probe")"
            done
          fi

          if [ -z "$KDIR" ]; then
            for makefile in $(find $search_roots -maxdepth 4 -type f -name Makefile 2>/dev/null); do
              dir="$(dirname "$makefile")"
              if grep -q "KERNELRELEASE" "$dir/Makefile"; then
                KDIR="$dir"
                break
              fi
            done
          fi

          if [ -n "$KDIR" ]; then
            echo "KDIR=$KDIR" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$KOUT" ]; then
            echo "KOUT=$KOUT" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$KDIR" ]; then
            exit 0
          fi

          echo "Unable to find a prepared kernel build directory."
          find $search_roots -maxdepth 6 -type f \( -name Makefile -o -name Module.symvers \) 2>/dev/null || true
          exit 1

      - name: Build external module
        run: |
          set -eux
          EXTRA_ARGS=""
          if [ -n "${{ steps.find-kbuild.outputs.KOUT }}" ] && [ "${{ steps.find-kbuild.outputs.KOUT }}" != "${{ steps.find-kbuild.outputs.KDIR }}" ]; then
            EXTRA_ARGS="KBUILD_OUTPUT=${{ steps.find-kbuild.outputs.KOUT }}"
          fi
          make -C "${{ steps.find-kbuild.outputs.KDIR }}" M="$GITHUB_WORKSPACE/module" CC=clang LLVM=1 $EXTRA_ARGS modules

      - name: Prepare NDK toolchain for loader
        run: |
          set -eux
          API=21
          NDK_BIN=""

          for base in "${ANDROID_NDK_HOME:-}" "${ANDROID_NDK_ROOT:-}" /opt/android-ndk* /opt/android-sdk/ndk/* /usr/lib/android-sdk/ndk/*; do
            [ -n "$base" ] || continue
            [ -d "$base" ] || continue
            cand="$base/toolchains/llvm/prebuilt/linux-x86_64/bin"
            if [ -x "$cand/aarch64-linux-android${API}-clang" ]; then
              NDK_BIN="$cand"
              break
            fi
          done

          if [ -z "$NDK_BIN" ]; then
            NDK_VER="r27c"
            NDK_DIR="$RUNNER_TEMP/android-ndk-${NDK_VER}"
            mkdir -p "$NDK_DIR"
            curl -fsSL -o "$RUNNER_TEMP/android-ndk.zip" "https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip"
            if command -v unzip >/dev/null 2>&1; then
              unzip -q "$RUNNER_TEMP/android-ndk.zip" -d "$NDK_DIR"
            elif command -v python3 >/dev/null 2>&1; then
              python3 -c 'import sys,zipfile; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])' "$RUNNER_TEMP/android-ndk.zip" "$NDK_DIR"
            else
              echo "Need unzip or python3 to extract Android NDK zip."
              exit 1
            fi
            NDK_CC="$(find "$NDK_DIR" -type f -path "*/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${API}-clang" | head -n 1)"
            if [ -n "$NDK_CC" ]; then
              NDK_BIN="$(dirname "$NDK_CC")"
            fi
          fi

          if [ -z "$NDK_BIN" ] || [ ! -x "$NDK_BIN/aarch64-linux-android${API}-clang" ]; then
            echo "Failed to prepare Android NDK clang toolchain."
            exit 1
          fi

          echo "LOADER_CC=$NDK_BIN/aarch64-linux-android${API}-clang" >> "$GITHUB_ENV"
          echo "LOADER_STRIP=$NDK_BIN/llvm-strip" >> "$GITHUB_ENV"

      - name: Build loader tools (NDK)
        run: |
          set -eux
          make -C "$GITHUB_WORKSPACE/loader" clean
          make -C "$GITHUB_WORKSPACE/loader" CC="$LOADER_CC"

      - name: Collect artifact
        run: |
          set -eux
          mkdir -p out
          cp "module/hello.ko" "out/android14-6.1_hello.ko"
          cp "loader/init_module_loader" "out/android14-6.1_init_module_loader_arm64"
          cp "loader/hello_comm_test" "out/android14-6.1_hello_comm_test_arm64"
          llvm-strip -d "out/android14-6.1_hello.ko"
          "$LOADER_STRIP" "out/android14-6.1_init_module_loader_arm64" || true
          "$LOADER_STRIP" "out/android14-6.1_hello_comm_test_arm64" || true
          ls -lh out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android14-6.1-lkm
          path: |
            out/android14-6.1_hello.ko
            out/android14-6.1_init_module_loader_arm64
            out/android14-6.1_hello_comm_test_arm64
