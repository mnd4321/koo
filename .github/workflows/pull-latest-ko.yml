name: Pull Latest KO

on:
  workflow_run:
    workflows:
      - Build External LKM
      - Auto Build External LKM
    types:
      - completed

permissions:
  actions: read

jobs:
  pull-latest-ko:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve artifact info
        id: resolve-artifact
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });

            const candidates = data.artifacts.filter((a) =>
              /-lkm$/.test(a.name) || a.name === 'android14-6.1-lkm'
            );

            if (candidates.length === 0) {
              core.setFailed(`No KO artifact found for run ${runId}.`);
              return;
            }

            const artifact = candidates[0];
            core.setOutput('artifact-name', artifact.name);
            core.setOutput('artifact-id', String(artifact.id));
            core.info(`Selected artifact: ${artifact.name} (id=${artifact.id})`);

      - name: Download artifact zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          mkdir -p out
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/artifacts/${{ steps.resolve-artifact.outputs.artifact-id }}/zip" \
            > out/latest-ko.zip

      - name: Extract latest KO
        run: |
          set -eux
          unzip -o out/latest-ko.zip -d out/extracted
          KO_PATH="$(find out/extracted -type f -name '*.ko' | head -n 1)"
          if [ -z "$KO_PATH" ]; then
            echo "No .ko file found in downloaded artifact."
            exit 1
          fi
          cp "$KO_PATH" out/latest.ko
          ls -lh out/latest.ko

      - name: Upload latest KO artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-ko
          path: out/latest.ko
